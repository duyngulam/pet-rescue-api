# ==========================================================
# LOCAL DEVELOPMENT
#
# ── Option 1 (default): Postgres only — run app with Gradle
#    docker-compose up -d
#    ./gradlew bootRun
#
# ── Option 2: Full Docker stack (JAR)
#    docker-compose --profile docker up -d --build
#
# Reset DB:  docker-compose down -v
# ==========================================================

services:
  # ── PostgreSQL ────────────────────────────────────────
  # Always started (no profile). Exposed on localhost:5432
  # for both bootRun and full-docker workflows.
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: petrescue-postgres
    environment:
      POSTGRES_DB: petrescue
      POSTGRES_USER: petrescue
      POSTGRES_PASSWORD: petrescue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrescue"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot App ───────────────────────────────────
  # Only started with:  docker-compose --profile docker up -d --build
  # Use bootRun for day-to-day development instead.
  app:
    profiles: [docker]
    build: .
    container_name: petrescue-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: petrescue
      DB_USERNAME: petrescue
      DB_PASSWORD: petrescue
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
    restart: on-failure

volumes:
  pgdata:
