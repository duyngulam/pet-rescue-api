# ==========================================================
# LOCAL DEVELOPMENT
#
# ── Option 1 (default): Postgres only — run app with Gradle
#    docker-compose up -d
#    ./gradlew bootRun
#
# ── Option 2: Full Docker stack (JAR)
#    docker-compose --profile docker up -d --build
#
# Reset DB:  docker-compose down -v
# ==========================================================

services:
  # ── PostgreSQL ────────────────────────────────────────
  # Always started (no profile). Exposed on localhost:5432
  # for both bootRun and full-docker workflows.
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: petrescue-postgres
    environment:
      POSTGRES_DB: petrescue
      POSTGRES_USER: petrescue
      POSTGRES_PASSWORD: petrescue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrescue"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────
  # Fast cache for denormalized counters (likes, comments)
  redis:
    image: redis:7-alpine
    container_name: petrescue-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ──────────────────────────────────────────
  # Message queue for async event processing
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: petrescue-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: petrescue
      RABBITMQ_DEFAULT_PASS: petrescue
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot App ───────────────────────────────────
  # Only started with:  docker-compose --profile docker up -d --build
  # Use bootRun for day-to-day development instead.
  app:
    profiles: [docker]
    build: .
    container_name: petrescue-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: petrescue
      DB_USERNAME: petrescue
      DB_PASSWORD: petrescue
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: petrescue
      RABBITMQ_PASSWORD: petrescue
    restart: on-failure

volumes:
  pgdata:
  redis-data:
  rabbitmq-data:
