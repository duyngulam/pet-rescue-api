# ===========================================
# PRODUCTION profile — NeonDB (cloud PostgreSQL)
# Activated by: SPRING_PROFILES_ACTIVE=production
#
# All DB_* values come from environment variables.
# NeonDB connection string format:
#   jdbc:postgresql://<host>/<dbname>?sslmode=require
# ===========================================
#lazy init
spring.main.lazy-initialization=true
# Database — NeonDB (external Postgres, NO local container)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool tuning for NeonDB serverless
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
# NeonDB can take 5-10s to wake from auto-suspend; 30s gives it enough headroom
spring.datasource.hikari.connection-timeout=30000
# Keepalive ping every 5 min — prevents NeonDB from suspending while the app is idle
spring.datasource.hikari.keepalive-time=300000
# Release idle connections after 5 min to match NeonDB's auto-suspend window
spring.datasource.hikari.idle-timeout=300000

# JPA — validate schema only (Flyway handles migrations)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Skip JDBC metadata queries during context startup (faster init)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT / Security (read secret from env)
app.security.jwt.secret=${JWT_SECRET:}
app.security.jwt.access-token-expiration-ms=900000000
app.security.jwt.issuer=pet-rescue-api
app.security.refresh-token.expiry-days=30

# CORS allowed origins for production (comma separated)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://pet-rescue-community.vercel.app}

# Mail — production uses env-configured SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# Disable dev tools
spring.devtools.restart.enabled=false

# Logging — less verbose
logging.level.root=WARN
logging.level.com.uit.petrescueapi=INFO
# Explicitly suppress hibernate SQL logging (base config sets it to DEBUG, which overrides root=WARN)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Swagger — keep enabled for demo; disable for real prod
springdoc.api-docs.enabled=true
# Disable Swagger UI in real production by default. Set SPRINGDOC_SWAGGER_UI_ENABLED=true when demo needed.
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
