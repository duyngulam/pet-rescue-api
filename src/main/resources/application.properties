# ===========================================
# Pet Rescue API — Default Configuration
# ===========================================

spring.application.name=pet-rescue-api
server.port=8080

# ===========================================
# Database — PostgreSQL (Docker container)
# Start Postgres: docker-compose up -d postgres
# ===========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petrescue}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:petrescue}
spring.datasource.password=${DB_PASSWORD:petrescue}

# HikariCP + PgBouncer compatibility
# Disable server-side prepared statements (required for PgBouncer transaction pooling mode)
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================
# Flyway — database migration
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===========================================
# JWT / Security
# ===========================================
app.security.jwt.secret=${JWT_SECRET:S2hhbmhUcmFuZ0Jhb0x1Y0RhbmhOZ3VvaVJhdERhdTEyMw==}
app.security.jwt.access-token-expiration-ms=90000000000
app.security.jwt.issuer=pet-rescue-api
app.security.refresh-token.expiry-days=7

# CORS allowed origins (comma separated, use * to allow all)
app.cors.allowed-origins=*

# ===========================================
# Email Verification
# ===========================================
app.email.from=${EMAIL_FROM:noreply@petrescue.local}
app.email.verification-url=${EMAIL_VERIFICATION_URL:http://localhost:8080/api/v1/auth/verify-email}
app.email.verification-token-expiry-minutes=1440

# ===========================================
# Password Reset
# ===========================================
app.email.password-reset-url=${PASSWORD_RESET_URL:http://localhost:3000/reset-password}
app.email.password-reset-token-expiry-minutes=60

# ===========================================
# Mail — Gmail SMTP
# ===========================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# ===========================================
# Cloudinary
# ===========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.temp-folder=temp
cloudinary.permanent-folder=pet-rescue

# ===========================================
# Logging
# ===========================================
logging.level.root=INFO
logging.level.com.uit.petrescueapi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health,info

# ===========================================
# OpenAPI / Swagger
# ===========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=false

# ===========================================
# Redis Configuration
# ===========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===========================================
# RabbitMQ Configuration
# ===========================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:petrescue}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:petrescue}
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms

# ===========================================
# Spring Batch Configuration
# ===========================================
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Social Media Event Queue Names
app.rabbitmq.exchange.social=social.exchange
app.rabbitmq.queue.post-liked=social.post.liked
app.rabbitmq.queue.post-unliked=social.post.unliked
app.rabbitmq.queue.comment-created=social.comment.created
app.rabbitmq.queue.comment-liked=social.comment.liked
app.rabbitmq.queue.comment-unliked=social.comment.unliked
app.rabbitmq.routing-key.post-liked=post.liked
app.rabbitmq.routing-key.post-unliked=post.unliked
app.rabbitmq.routing-key.comment-created=comment.created
app.rabbitmq.routing-key.comment-liked=comment.liked
app.rabbitmq.routing-key.comment-unliked=comment.unliked

# Redis Key Prefixes
app.redis.key.post-likes=post:%s:likes
app.redis.key.comment-likes=comment:%s:likes
app.redis.key.post-comment-count=post:%s:comment_count
app.redis.key.comment-reply-count=comment:%s:reply_count

# Geo presence (lightweight realtime)
app.geo.update-rate-limit-ms=3000
app.geo.inactive-after-seconds=60
app.geo.cleanup-interval-ms=10000
app.geo.realtime-radius-km=2.0
app.geo.realtime-nearby-limit=200
