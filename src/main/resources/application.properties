# ===========================================
# Pet Rescue API — Default Configuration
# ===========================================

spring.application.name=pet-rescue-api
server.port=8080

# ===========================================
# Database — PostgreSQL (Docker container)
# Start Postgres: docker-compose up -d postgres
# ===========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petrescue}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:petrescue}
spring.datasource.password=${DB_PASSWORD:petrescue}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================
# Flyway — database migration
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===========================================
# JWT / Security
# ===========================================
app.security.jwt.secret=${JWT_SECRET:S2hhbmhUcmFuZ0Jhb0x1Y0RhbmhOZ3VvaVJhdERhdTEyMw==}
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.issuer=pet-rescue-api
app.security.refresh-token.expiry-days=7

# CORS allowed origins (comma separated). Default allows local frontend and Vercel deploy.
app.cors.allowed-origins=http://localhost:5173,https://pet-rescue-community.vercel.app

# ===========================================
# Email Verification
# ===========================================
app.email.from=${EMAIL_FROM:noreply@petrescue.local}
app.email.verification-url=${EMAIL_VERIFICATION_URL:http://localhost:8080/api/v1/auth/verify-email}
app.email.verification-token-expiry-minutes=1440

# ===========================================
# Mail — Gmail SMTP
# ===========================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# ===========================================
# Logging
# ===========================================
logging.level.root=INFO
logging.level.com.uit.petrescueapi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health,info

# ===========================================
# OpenAPI / Swagger
# ===========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=false

