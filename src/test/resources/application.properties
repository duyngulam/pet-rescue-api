# ===========================================
# TEST — H2 in-memory (no Docker needed for tests)
# ===========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Flyway in tests — JPA auto-creates schema
spring.flyway.enabled=false

# JWT — static dev secret (Base64-encoded, ≥256 bits)
app.security.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudCBvbmx5IHBsZWFzZSBjaGFuZ2UgaW4gcHJvZA==
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.issuer=pet-rescue-api-test

# Disable actual email sending in tests
spring.mail.host=localhost
spring.mail.port=25
